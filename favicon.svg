<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#160700"/>
      <stop offset="100%" stop-color="#2D1000"/>
    </linearGradient>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5500"/>
      <stop offset="100%" stop-color="#FF8800"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="3"  y="15" width="3" height="5"  rx="1.5" fill="url(#sg)" filter="url(#glow)"/>
  <rect x="8"  y="12" width="3" height="11" rx="1.5" fill="url(#sg)" filter="url(#glow)"/>
  <rect x="13" y="8"  width="3" height="18" rx="1.5" fill="url(#sg)" filter="url(#glow)"/>
  <rect x="18" y="11" width="3" height="12" rx="1.5" fill="url(#sg)" filter="url(#glow)"/>
  <rect x="23" y="14" width="3" height="6"  rx="1.5" fill="url(#sg)" filter="url(#glow)"/>
</svg>
